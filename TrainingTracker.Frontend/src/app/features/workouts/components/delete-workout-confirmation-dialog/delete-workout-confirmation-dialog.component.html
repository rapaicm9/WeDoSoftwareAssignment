<h2 mat-dialog-title>
  <mat-icon>delete_outline</mat-icon>
  Delete workout?
</h2>

<mat-dialog-content>
  <p>
    Are you sure you want to delete
    <strong>{{ workoutTitle }}</strong>?
  </p>

  <p class="warning-text">
    This action cannot be undone.
  </p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button
    mat-button
    type="button"
    (click)="cancel()"
  >
    Cancel
  </button>

  <button
    mat-flat-button
    type="button"
    class="delete-action"
    (click)="confirm()"
  >
    Delete
  </button>
</mat-dialog-actions>
