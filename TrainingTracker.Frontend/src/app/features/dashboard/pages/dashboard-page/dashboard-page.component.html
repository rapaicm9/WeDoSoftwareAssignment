<mat-sidenav-container class="dashboard-shell">
  <mat-sidenav class="dashboard-sidebar" mode="side" opened>
    <div class="sidebar-content">
      <div class="sidebar-brand">
        <div class="brand-mark">TT</div>

        <div>
          <h1>TrainingTracker</h1>
          <p>Workout dashboard</p>
        </div>
      </div>

      <nav class="sidebar-nav" aria-label="Dashboard navigation">
        @for (item of navigationItems; track item.route) {
          <a
            mat-button
            class="sidebar-nav-link"
            [routerLink]="item.route"
            routerLinkActive="active-link"
            [routerLinkActiveOptions]="{ exact: item.exact }"
          >
            <mat-icon>{{ item.icon }}</mat-icon>
            <span>{{ item.label }}</span>
          </a>
        }
      </nav>

      <div class="sidebar-footer">
        @if (currentUser(); as user) {
          <div class="current-user-card">
            <p class="current-user-label">Signed in as</p>
            <p class="current-user-name">
              {{ user.firstName }} {{ user.lastName }}
            </p>
            <p class="current-user-email">{{ user.email }}</p>
          </div>
        }

        <button
          mat-button
          type="button"
          class="sidebar-nav-link logout-button"
          (click)="logout()"
        >
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="dashboard-content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
